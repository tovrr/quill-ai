name: CI — AI Rules & Typecheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ai-rules-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Generate AI rules
        run: npm run gen:ai-rules
      - name: Check AI rules
        run: npm run check:ai-rules
      - name: Typecheck
        run: npm run typecheck
