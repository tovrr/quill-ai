name: CI — Prompts examples

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  prompts-examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Validate prompt examples
        run: node scripts/prompts.mjs --run-examples
