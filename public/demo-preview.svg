<svg width="1400" height="840" viewBox="0 0 1400 840" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="840" gradientUnits="userSpaceOnUse">
      <stop stop-color="#09090E"/>
      <stop offset="1" stop-color="#11111A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#EF4444"/>
      <stop offset="1" stop-color="#F87171"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1400" height="840" fill="url(#bg)"/>
  <circle cx="280" cy="120" r="200" fill="#EF4444" fill-opacity="0.12" filter="url(#glow)"/>

  <rect x="80" y="70" width="1240" height="700" rx="20" fill="#0D0D15" stroke="#1E1E2E"/>
  <rect x="80" y="70" width="1240" height="66" rx="20" fill="#0A0A10"/>

